        #bridle {

        #untitled2026 {background-color: #2a2a2e;}
        .gp-title {
            font-weight: 900;
            font-size: 5rem;
            display: grid;
            align-items: center;
            justify-content: center;
            line-height: 4rem;
            letter-spacing: -8.25px;
            width: fit-content;
            justify-items: end;
            grid-template-columns: repeat(2,auto);
            font-family: Lexend;
            color: #f8f8f8;
        }

        .gp-title span:first-child {
            padding-right: 6px;
            margin: 0;
        }

        .gp-title span {margin-left: -6px;}
        .gp-title span:last-child {
            font-size: 2rem;
            letter-spacing: 0;
            font-weight: 100;
            line-height: 1.5rem;
            margin: 0;
        }

        #down {
            position: fixed;
            bottom: 0;
            z-index: 999;
            pointer-events: none;
            color: #2a2a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Noto Sans SC;
            font-weight: 200;
            animation: down 5s infinite;
            opacity: 1;
            transition: opacity .5s ease;
        }

        #down::after {
            font-family: "fontawesome";
            content: "\f107";
            font-size: 30px;
            height: 20px;
            display: flex;
            align-items: center;
            margin-top: -5px;
        }

        #down.is-hidden {opacity: 0;}

        #first-title {
            font-size: 3rem;
            font-weight: 900;
            padding: 1rem 0;
            color: #e9e9e9;
            width: 100%;
            position: sticky;
            text-align: right;
            overflow: hidden;
            top: 0;
            z-index: 9;
        }

        #first-title span {
            z-index: 2;
            margin-right: 2rem;
        }

        #first-title::after,
        #first-title::before {
            content: "";
            width: 100%;
            height: 100%;
            display: block;
            position: absolute;
            right: 100%;
            top: 0;
            z-index: -1;
        }

        #first-title::before {background-color: #3d47ca;}
        #first-title::after {
            background-color: #2a2a2e;
            margin-right: 23rem;
            transform: skewX(-15deg);
        }

        #first-title.scrolled-1::before {animation: title1-1 2s ease .15s forwards;}
        #first-title.scrolled-1::after {animation: title1-2 2s ease forwards;}

        #second-child {
            background-color: #e9e9e9;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            width: 100%;
            position: relative;
            clip-path: polygon(0% 0%,100% 0%,100% -50%,0% 0%);
            transition: 4s ease;
            transition-delay: 1.6s;
            /*animation: second-child .1s ease 7s forwards;*/
        }

        #second-child.scrolled-1 {
            clip-path: polygon(0% 0%,100% 0%,100% 100%,0% 100%);
        }

        #second-child .card {
            height: calc((100vw - 5px) / 3);
            position: relative;
            transition: all .5s ease;
        }

        #second-child:has(.card:hover) .card .content {filter: opacity(0.3) grayscale(1);}
        #second-child .content{
            width: 100%;
            height: 100%;
            background-color: #e9e9e9;
            position: relative;
            overflow: hidden;
            transition: all .5s ease;
        }
        #second-child .card .content:hover {
            /*transform: scale(1.05);*/
            filter: none!important;
            z-index: 5;
        }

        #bottom {   
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1rem;
            font-weight: 100;
            background-color: #e9e9e9;
            width: 100%;
            justify-content: center;

            color: #2a2a2e;
            transition: all .2s ease;
        }

        #bottom a:hover {
            color: #f8f8f8;
            background-color: #2a2a2e;
        }

        #taatt .content {

            background-size: cover;
            background-position: center;
        }

        #taatt .content .cover {
            height: 100%;
            filter: invert(.8) sepia(1);
            mix-blend-mode: color-burn;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;

        #taatt .content span {

            font-size: 2rem;
            font-weight: bold;
            color: white;

            border: 1px solid rgb(1,1,5);

            flex-direction: column;
            align-items: center;

        #baos .baos_title {
            color: rgb(1,1,5);

            padding: 0 1rem;
            height: 1.5rem;

            align-items: center;
        }

        #baos .baos_outline {

            height: auto;
            padding: .5rem;

        #baos .baos_content {

        #baos .baos_content div {

            font-weight: bold;
            font-size: 2.5rem;

        #baos .baos_content span {

            font-size: 1rem;
        }

        #c1-1 {grid-column: span 2;}

            content: "";
            background-image: url(https://brsandbox-pro.wdfiles.com/local--files/gp-level-c-1/C-1.png);
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            z-index: -1;

            filter: blur(3px);

        #c1-1 .content {
            z-index: 1;
            display: flex;
            flex-direction: column;
        }

        #c1-1 .content .title {

            border-bottom: 0.0625rem solid rgb(25,20,16);
            padding: 0 0 0.25em;
            min-height: 2rem;

            font-weight: 700;
            font-size: 2rem;

        #c1-1 .content .warn {

            margin: 1rem auto 2rem;
            box-shadow: 0 0.1rem 0.3rem rgba(0,0,0,0.4);
            background: rgb(249, 249, 249);
            font-size: 1rem;
            padding: 1.5rem 2rem;
            max-width: 18rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
            justify-content: center;
        }

        #c-418 .content::before {
            content: "";
            background-image: url(https://gaplouelpew.wdfiles.com/local--files/component%3Ablankforps/image.jpg);
            position: absolute;

            top: 0;

            height: 100%;

        #c-418 div {

            font-family: 'Noto Serif SC';
            font-weight: 900;

        }

        @keyframes down {
            0% {transform: translateY(-.5rem);}
            50% {transform: translateY(0);}
            100% {transform: translateY(-.5rem);}
        }

        @keyframes title1-1 {
            0% {right: 100%;transform: skewX(0);}
            99% {right: -5rem;transform: skewX(-15deg);}
            100% {right: 0;transform: skewX(0);}
        }

        @keyframes title1-2 {
            0% {right: 100%;transform: skewX(0);}
            100% {right: 0;transform: skewX(-15deg);}
        }

        @keyframes second-child {
            0% {clip-path: none; pointer-events: none;}
            100% {clip-path: none; pointer-events: unset;}

<script>
    window.addEventListener('DOMContentLoaded', function() {
        const downElement = document.getElementById('down');
        let isdown = false;
        window.addEventListener('scroll', function() {
            const scrollPosition = window.pageYOffset || 
                                  document.documentElement.scrollTop || 
                                  document.body.scrollTop;
            if (scrollPosition < 1 && !isdown) {
                downElement.classList.remove('is-hidden');
            } else {
                downElement.classList.add('is-hidden');
                isdown = true;
            }
        });
        window.dispatchEvent(new Event('scroll'));

        
        const firTitle = document.getElementById('first-title');
        const firChild = document.getElementById('first-child');
        const secChild = document.getElementById('second-child');
        
        const observer1 = new IntersectionObserver(function(entries) {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    firTitle.classList.add('scrolled-1');
                    firChild.classList.add('scrolled-1');
                    secChild.classList.add('scrolled-1');
                }
                else {
                    firChild.classList.remove('scrolled-1');
                }
            });
        }, { threshold: 0.2 });
        
        observer1.observe(firTitle);
    });
</script>
